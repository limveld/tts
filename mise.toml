[tools]
go = "latest"
python = "3.12"

[tasks.setup]
description = "Create the Python venv and install the Kokoro sidecar deps"
run = [
  "python -m venv .venv",
  "./.venv/bin/pip install -U pip",
  "./.venv/bin/pip install -r pysidecar/requirements.txt",
]

# ---- server ----------------------------------------------------------------

[tasks."server:build"]
description = "Build the TTS server binary"
sources = ["server/*.go", "go.mod"]
outputs = ["bin/tts-server"]
run = "go build -o bin/tts-server ./server"

[tasks."server:serve"]
description = "Run the TTS server in the foreground (dev, kokoro engine)"
depends = ["server:build"]
run = "./bin/tts-server"

[tasks."server:serve:chatterbox"]
description = "Run the TTS server with the external Chatterbox engine (set CHATTERBOX_URL)"
depends = ["server:build"]
run = '''
: "${CHATTERBOX_URL:?set CHATTERBOX_URL to your devnen server URL, e.g. http://127.0.0.1:8004}"
./bin/tts-server -engine chatterbox
'''

[tasks."server:serve:polly"]
description = "Run the TTS server with the Amazon Polly engine (needs AWS creds in ~/.aws or env)"
depends = ["server:build"]
run = "./bin/tts-server -engine polly"

[tasks."server:service:install"]
description = "Install & start the TTS server launchd service (auto-start at login)"
depends = ["server:build"]
run = "bash deploy/service.sh server install"

[tasks."server:service:uninstall"]
description = "Stop & remove the TTS server service"
run = "bash deploy/service.sh server uninstall"

[tasks."server:service:start"]
description = "Start (load) the TTS server service"
run = "bash deploy/service.sh server start"

[tasks."server:service:stop"]
description = "Stop (unload) the TTS server service"
run = "bash deploy/service.sh server stop"

[tasks."server:service:restart"]
description = "Restart the TTS server service"
run = "bash deploy/service.sh server restart"

[tasks."server:service:status"]
description = "Show the TTS server service state and hit /healthz"
run = "bash deploy/service.sh server status"

[tasks."server:service:logs"]
description = "Follow the TTS server error log"
run = "bash deploy/service.sh server logs"

# ---- sfx --------------------------------------------------------------------

[tasks."sfx:fetch"]
description = "Download soundboard clips declared in sfx.toml into sfx/ (idempotent)"
run = "go run ./cmd/sfx-fetch"

# ---- chatterbox (expressive engine; the vendored devnen submodule) ----------

[tasks."chatterbox:setup"]
description = "Install the Chatterbox (devnen) submodule into its own Python 3.10 venv (heavy)"
run = "bash deploy/chatterbox-setup.sh"

[tasks."chatterbox:serve"]
description = "Run the Chatterbox server in the foreground (dev); needs chatterbox:setup first"
dir = "chatterbox-server"
env = { PYTORCH_ENABLE_MPS_FALLBACK = "1" }
run = "venv/bin/python server.py"

[tasks."chatterbox:service:install"]
description = "Install & start the Chatterbox launchd service (auto-start at login)"
run = "bash deploy/service.sh chatterbox install"

[tasks."chatterbox:service:uninstall"]
description = "Stop & remove the Chatterbox service"
run = "bash deploy/service.sh chatterbox uninstall"

[tasks."chatterbox:service:start"]
description = "Start (load) the Chatterbox service"
run = "bash deploy/service.sh chatterbox start"

[tasks."chatterbox:service:stop"]
description = "Stop (unload) the Chatterbox service"
run = "bash deploy/service.sh chatterbox stop"

[tasks."chatterbox:service:restart"]
description = "Restart the Chatterbox service"
run = "bash deploy/service.sh chatterbox restart"

[tasks."chatterbox:service:status"]
description = "Show the Chatterbox service state and hit /api/model-info"
run = "bash deploy/service.sh chatterbox status"

[tasks."chatterbox:service:logs"]
description = "Follow the Chatterbox error log"
run = "bash deploy/service.sh chatterbox logs"

# ---- bot -------------------------------------------------------------------

[tasks."bot:build"]
description = "Build the Twitch bot binary"
sources = ["bot/*.go", "go.mod"]
outputs = ["bin/tts-bot"]
run = "go build -o bin/tts-bot ./bot"

[tasks."bot:test"]
description = "Run the bot test suite"
run = "go test ./bot/..."

[tasks."bot:serve"]
description = "Run the bot in the foreground (set TTS_CHANNEL=<your_channel>)"
depends = ["bot:build"]
run = './bin/tts-bot -channel "${TTS_CHANNEL:?set TTS_CHANNEL to your twitch channel}"'

[tasks."bot:auth"]
description = "One-time Twitch OAuth consent so the bot can reply (set TWITCH_CLIENT_ID/SECRET)"
run = '''
: "${TWITCH_CLIENT_ID:?set TWITCH_CLIENT_ID to your Twitch app id}"
: "${TWITCH_CLIENT_SECRET:?set TWITCH_CLIENT_SECRET to your Twitch app secret}"
go run ./cmd/bot-auth
'''

[tasks."bot:service:install"]
description = "Install & start the bot launchd service (set TTS_CHANNEL first)"
depends = ["bot:build"]
run = "bash deploy/service.sh bot install"

[tasks."bot:service:uninstall"]
description = "Stop & remove the bot service"
run = "bash deploy/service.sh bot uninstall"

[tasks."bot:service:start"]
description = "Start (load) the bot service"
run = "bash deploy/service.sh bot start"

[tasks."bot:service:stop"]
description = "Stop (unload) the bot service"
run = "bash deploy/service.sh bot stop"

[tasks."bot:service:restart"]
description = "Restart the bot service"
run = "bash deploy/service.sh bot restart"

[tasks."bot:service:status"]
description = "Show the bot service state"
run = "bash deploy/service.sh bot status"

[tasks."bot:service:logs"]
description = "Follow the bot error log"
run = "bash deploy/service.sh bot logs"
