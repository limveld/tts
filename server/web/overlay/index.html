<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Stream Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/overlay/overlay.css">
</head>
<body>
<!-- Full-screen transparent overlay. Everything renders from the server's SSE
     stream; the page holds no game state of its own and never talks to Twitch.
     Stage 1 wires only the invisible audio player; the game containers below are
     filled in by later stages. -->
<div id="stage">
  <div id="top-right">
    <div id="wordle" class="panel" hidden></div>
    <div id="gamble" class="panel" hidden></div>
  </div>
  <div id="depth" hidden></div>
  <div id="notify"></div>
</div>
<script src="/overlay/overlay.js"></script>
</body>
</html>
